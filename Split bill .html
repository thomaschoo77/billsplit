<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Split">
<meta name="theme-color" content="#14110d">
<title>Split</title>
<style>
  :root{
    --bg:#14110d;
    --panel:#1e1a14;
    --panel-2:#272117;
    --line:#38301f;
    --ink:#f4ede0;
    --ink-dim:#a79b83;
    --ink-faint:#6f6650;
    --gold:#e0a955;
    --gold-soft:#3a2f18;
    --red:#c66b52;
    --radius:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-size:16px;
    line-height:1.4;
    padding:env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 16px);
    max-width:520px;
    margin:0 auto;
    -webkit-text-size-adjust:100%;
  }
  header{
    display:flex;align-items:baseline;justify-content:space-between;
    padding:20px 0 14px;
  }
  header h1{
    margin:0;font-size:26px;font-weight:600;letter-spacing:-0.02em;
    font-family:"Iowan Old Style",Georgia,serif;
  }
  header h1 .dot{color:var(--gold);}
  .clear-btn{
    background:none;border:0.5px solid var(--line);color:var(--ink-dim);
    font-size:13px;padding:7px 13px;border-radius:999px;cursor:pointer;
  }
  .clear-btn:active{background:var(--panel-2);}
  .section-label{
    font-size:12px;text-transform:uppercase;letter-spacing:0.08em;
    color:var(--ink-faint);margin:18px 0 9px;font-weight:600;
  }
  input{
    background:var(--panel);border:0.5px solid var(--line);color:var(--ink);
    font-size:16px;padding:12px 14px;border-radius:11px;width:100%;
    font-family:inherit;outline:none;
  }
  input:focus{border-color:var(--gold);}
  input::placeholder{color:var(--ink-faint);}
  .row{display:flex;gap:9px;align-items:center;}
  .icon-btn{
    background:var(--gold);border:none;color:#14110d;
    width:46px;height:46px;min-width:46px;border-radius:11px;
    font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-weight:400;
  }
  .icon-btn:active{filter:brightness(0.9);}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;}
  .chip{
    font-size:14px;padding:7px 14px;border-radius:999px;cursor:pointer;
    border:0.5px solid var(--line);background:transparent;color:var(--ink-dim);
    font-family:inherit;
  }
  .chip.on{background:var(--gold-soft);border-color:var(--gold);color:var(--gold);}
  .chip.person{color:var(--ink);}
  .chip .rm{color:var(--ink-faint);margin-left:6px;font-size:15px;}
  .add-item-btn{
    width:100%;background:var(--panel-2);border:0.5px solid var(--line);
    color:var(--ink);font-size:15px;padding:13px;border-radius:11px;
    cursor:pointer;margin-top:10px;font-family:inherit;font-weight:500;
  }
  .add-item-btn:active{background:var(--panel);}
  .item{
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 0;border-bottom:0.5px solid var(--line);
  }
  .item .nm{font-size:15px;}
  .item .who{font-size:12.5px;color:var(--ink-dim);margin-top:2px;}
  .item .who.none{color:var(--red);}
  .item .rt{display:flex;align-items:center;gap:12px;}
  .item .pr{font-size:15px;color:var(--ink);font-variant-numeric:tabular-nums;}
  .item .del{background:none;border:none;color:var(--ink-faint);font-size:18px;cursor:pointer;padding:4px;}
  .extras{display:flex;gap:12px;margin-top:16px;}
  .extras>div{flex:1;}
  .extras label{font-size:12px;color:var(--ink-dim);display:block;margin-bottom:5px;}
  .card{
    background:var(--panel);border:0.5px solid var(--line);
    border-radius:var(--radius);padding:16px 18px;margin-top:22px;
  }
  .card .total-row{
    display:flex;justify-content:space-between;align-items:baseline;
    padding-bottom:12px;border-bottom:0.5px solid var(--line);margin-bottom:4px;
  }
  .card .total-row .lbl{font-size:13px;color:var(--ink-dim);}
  .card .total-row .val{font-size:23px;font-weight:600;font-variant-numeric:tabular-nums;font-family:"Iowan Old Style",Georgia,serif;}
  .owe-row{
    display:flex;justify-content:space-between;align-items:baseline;
    padding:11px 0;border-bottom:0.5px solid var(--line);
  }
  .owe-row:last-child{border-bottom:none;}
  .owe-row .nm{font-size:15px;}
  .owe-row .amt{font-size:16px;font-weight:600;color:var(--gold);font-variant-numeric:tabular-nums;}
  .empty{color:var(--ink-faint);font-size:14px;padding:20px 0;text-align:center;}
  .cur-wrap{display:flex;align-items:center;gap:8px;margin-bottom:2px;}
  .cur-wrap select{
    background:var(--panel);border:0.5px solid var(--line);color:var(--ink-dim);
    font-size:12px;padding:5px 8px;border-radius:8px;font-family:inherit;outline:none;
  }
</style>
</head>
<body>

<header>
  <h1>Split<span class="dot">.</span></h1>
  <button class="clear-btn" id="clearBtn">Clear bill</button>
</header>

<div class="cur-wrap">
  <span style="font-size:12px;color:var(--ink-faint);">Currency</span>
  <select id="cur">
    <option value="$">SGD $</option>
    <option value="RM">RM</option>
    <option value="¥">¥ CNY</option>
    <option value="€">€</option>
    <option value="£">£</option>
    <option value="US$">US$</option>
  </select>
</div>

<div class="section-label">Who's here</div>
<div class="row">
  <input id="nameIn" type="text" placeholder="Add a name" autocomplete="off" autocapitalize="words">
  <button class="icon-btn" id="addPerson" aria-label="Add person">+</button>
</div>
<div class="chips" id="people"></div>

<div class="section-label">Add an item &middot; tap who shared it</div>
<div class="row">
  <input id="itemName" type="text" placeholder="Item" autocomplete="off" style="flex:2;">
  <input id="itemPrice" type="number" inputmode="decimal" placeholder="0.00" style="flex:1;">
</div>
<div class="chips" id="itemPeople"></div>
<button class="add-item-btn" id="addItem">+ Add item</button>

<div id="items"></div>

<div class="extras">
  <div>
    <label>Tax / GST</label>
    <input id="tax" type="number" inputmode="decimal" placeholder="0.00">
  </div>
  <div>
    <label>Tip / service</label>
    <input id="tip" type="number" inputmode="decimal" placeholder="0.00">
  </div>
</div>

<div id="totals"></div>

<script>
(function(){
  var KEY = 'splitApp_v1';
  var state = load() || { people:[], items:[], tax:'', tip:'', cur:'$', sel:{} };

  function load(){ try{ return JSON.parse(localStorage.getItem(KEY)); }catch(e){ return null; } }
  function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }

  var el = function(id){ return document.getElementById(id); };
  var nameIn=el('nameIn'), peopleWrap=el('people'), itemPeopleWrap=el('itemPeople'),
      itemsWrap=el('items'), totalsWrap=el('totals'), taxIn=el('tax'), tipIn=el('tip'),
      curSel=el('cur');

  taxIn.value = state.tax; tipIn.value = state.tip; curSel.value = state.cur;

  function money(n){ return state.cur + n.toFixed(2); }

  function renderPeople(){
    peopleWrap.innerHTML='';
    state.people.forEach(function(p,i){
      var c=document.createElement('button');
      c.className='chip person';
      c.innerHTML=p+'<span class="rm">&times;</span>';
      c.onclick=function(){
        state.people.splice(i,1);
        delete state.sel[p];
        state.items.forEach(function(it){ delete it.who[p]; });
        renderAll();
      };
      peopleWrap.appendChild(c);
    });
    itemPeopleWrap.innerHTML='';
    state.people.forEach(function(p){
      var c=document.createElement('button');
      c.className='chip'+(state.sel[p]?' on':'');
      c.textContent=p;
      c.onclick=function(){ state.sel[p]=!state.sel[p]; save(); renderItemChips(); };
      itemPeopleWrap.appendChild(c);
    });
  }
  function renderItemChips(){
    itemPeopleWrap.innerHTML='';
    state.people.forEach(function(p){
      var c=document.createElement('button');
      c.className='chip'+(state.sel[p]?' on':'');
      c.textContent=p;
      c.onclick=function(){ state.sel[p]=!state.sel[p]; save(); renderItemChips(); };
      itemPeopleWrap.appendChild(c);
    });
  }

  function renderItems(){
    itemsWrap.innerHTML='';
    state.items.forEach(function(it,i){
      var who=Object.keys(it.who);
      var row=document.createElement('div');
      row.className='item';
      var left=document.createElement('div');
      left.style.minWidth='0';
      left.innerHTML='<div class="nm">'+esc(it.name)+'</div>'+
        '<div class="who'+(who.length?'':' none')+'">'+(who.length?who.join(', '):'nobody assigned')+'</div>';
      var rt=document.createElement('div');
      rt.className='rt';
      var pr=document.createElement('span');
      pr.className='pr'; pr.textContent=money(it.price);
      var del=document.createElement('button');
      del.className='del'; del.setAttribute('aria-label','Remove'); del.innerHTML='&times;';
      del.onclick=function(){ state.items.splice(i,1); renderAll(); };
      rt.appendChild(pr); rt.appendChild(del);
      row.appendChild(left); row.appendChild(rt);
      itemsWrap.appendChild(row);
    });
  }

  function renderTotals(){
    var tax=parseFloat(state.tax)||0, tip=parseFloat(state.tip)||0;
    var subtotal=state.items.reduce(function(s,it){return s+it.price;},0);
    var owed={}; state.people.forEach(function(p){ owed[p]=0; });
    state.items.forEach(function(it){
      var who=Object.keys(it.who); if(!who.length) return;
      var share=it.price/who.length;
      who.forEach(function(p){ if(owed[p]!==undefined) owed[p]+=share; });
    });
    var extras=tax+tip;
    if(subtotal>0 && extras>0){
      state.people.forEach(function(p){ owed[p]+=(owed[p]/subtotal)*extras; });
    }
    var grand=subtotal+extras;
    totalsWrap.innerHTML='';
    if(state.people.length===0 && state.items.length===0){
      totalsWrap.innerHTML='<div class="empty">Add people and items to see who owes what.</div>';
      return;
    }
    var card=document.createElement('div'); card.className='card';
    var head=document.createElement('div'); head.className='total-row';
    head.innerHTML='<span class="lbl">Total bill</span><span class="val">'+money(grand)+'</span>';
    card.appendChild(head);
    state.people.forEach(function(p){
      var r=document.createElement('div'); r.className='owe-row';
      r.innerHTML='<span class="nm">'+esc(p)+'</span><span class="amt">'+money(owed[p])+'</span>';
      card.appendChild(r);
    });
    totalsWrap.appendChild(card);
  }

  function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

  function renderAll(){ save(); renderPeople(); renderItems(); renderTotals(); }

  el('addPerson').onclick=function(){
    var v=nameIn.value.trim();
    if(v && state.people.indexOf(v)===-1){ state.people.push(v); nameIn.value=''; renderAll(); }
    nameIn.focus();
  };
  nameIn.addEventListener('keydown',function(e){ if(e.key==='Enter') el('addPerson').click(); });

  el('addItem').onclick=function(){
    var n=el('itemName').value.trim();
    var pr=parseFloat(el('itemPrice').value);
    if(!n || isNaN(pr)) return;
    var who={};
    Object.keys(state.sel).forEach(function(p){ if(state.sel[p] && state.people.indexOf(p)!==-1) who[p]=true; });
    state.items.push({name:n, price:pr, who:who});
    el('itemName').value=''; el('itemPrice').value=''; state.sel={};
    renderAll();
    el('itemName').focus();
  };

  taxIn.addEventListener('input',function(){ state.tax=taxIn.value; save(); renderTotals(); });
  tipIn.addEventListener('input',function(){ state.tip=tipIn.value; save(); renderTotals(); });
  curSel.addEventListener('change',function(){ state.cur=curSel.value; renderAll(); });

  el('clearBtn').onclick=function(){
    if(confirm('Clear this bill? People, items, tax and tip will be reset.')){
      state={ people:[], items:[], tax:'', tip:'', cur:state.cur, sel:{} };
      taxIn.value=''; tipIn.value=''; renderAll();
    }
  };

  renderAll();
})();
</script>
</body>
</html>
